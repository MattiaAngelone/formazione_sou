global
    log /dev/log local0
    maxconn 2000

defaults
    mode    http
    log     global
    option  httplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http_in
    bind *:80
    redirect scheme https code 301 if !{ ssl_fc }

frontend https_in
    bind *:443 ssl crt /etc/haproxy/certs/proxy.pem

    use_backend backend_sito1 if { path_beg /backend1 }
    use_backend backend_sito2 if { path_beg /backend2 }

    default_backend backend_pool

backend backend_sito1
    server backend1 192.168.56.11:80 check

backend backend_sito2
    server backend2 192.168.56.12:80 check

backend backend_pool
    balance roundrobin
    server backend1 192.168.56.11:80 check
    server backend2 192.168.56.12:80 check
